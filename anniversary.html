<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Love Page</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

/* 🌌 Base */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    color: white;
    overflow-x: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* 🌌 Ultra smooth background */
body::before {
    content: "";
    position: fixed;
    width: 300%;
    height: 300%;
    background: linear-gradient(120deg, #ff4d6d, #6a11cb, #2575fc, #ff4d6d);
    background-size: 300% 300%;
    animation: luxuryBG 30s ease-in-out infinite;
    z-index: -2;
    filter: blur(70px);
    opacity: 0.75;
}

@keyframes luxuryBG {
    0% { transform: translate(0%, 0%) scale(1); }
    50% { transform: translate(-20%, -20%) scale(1.1); }
    100% { transform: translate(0%, 0%) scale(1); }
}

/* 💫 stars */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(white 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.08;
    animation: starsMove 80s linear infinite;
    z-index: -1;
}

@keyframes starsMove {
    from { transform: translateY(0); }
    to { transform: translateY(-300px); }
}

/* 🔐 login */
.login-box {
    text-align: center;
    animation: fadeIn 1.5s ease;
}

input {
    padding: 12px;
    border-radius: 12px;
    border: none;
    outline: none;
    width: 220px;
    background: rgba(255,255,255,0.15);
    color: white;
    backdrop-filter: blur(10px);
}

button {
    padding: 12px 28px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(45deg, #ff4d6d, #ff758c);
    color: white;
    cursor: pointer;
    margin-top: 15px;
    transition: all 0.3s ease;
    box-shadow: 0 5px 20px rgba(255,77,109,0.5);
}

button:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 10px 30px rgba(255,77,109,0.7);
}

/* 💎 main */
.main {
    display: none;
    width: 100%;
}

/* 💎 card */
.card {
    max-width: 750px;
    margin: auto;
    padding: 40px;
    border-radius: 25px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    box-shadow:
        0 20px 60px rgba(0,0,0,0.5),
        inset 0 0 40px rgba(255,255,255,0.05);
    animation: fadeUp 1.5s ease;
}

/* 👑 heading with pulse */
h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 3.5em;
    margin-bottom: 10px;
    color: #13e440;

    animation: glowPulse 3s ease-in-out infinite;
}

/* 💓 glow pulse animation */
@keyframes glowPulse {
    0% {
        text-shadow: 0 0 10px rgba(255,77,109,0.4),
                     0 0 20px rgba(255,77,109,0.4);
        transform: scale(1);
    }

    50% {
        text-shadow: 0 0 30px rgba(255,77,109,1),
                     0 0 60px rgba(255,77,109,0.8);
        transform: scale(1.06);
    }

    100% {
        text-shadow: 0 0 10px rgba(255,77,109,0.4),
                     0 0 20px rgba(255,77,109,0.4);
        transform: scale(1);
    }
}

/* 💌 subtitle */
.sub {
    opacity: 0.7;
    font-size: 0.9em;
}

/* 💌 typing */
.typing {
    font-size: 1.15em;
    line-height: 1.9;
    margin-top: 25px;
    white-space: pre-line;
}

/* ✨ animations */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>
</head>

<body>

<div class="login-box" id="loginBox">
    <h2>🔐 Enter Password</h2>
    <input type="password" id="password">
    <br>
    <button onclick="unlockMain()">Unlock</button>
</div>

<div class="main" id="mainContent">
    <div class="card">
        <h1>Happy Anniversary 🎀🫂💙</h1>
        <p class="sub">3 Years • Infinite Love 💖</p>
        <p class="typing" id="text"></p>
    </div>
</div>

<script>

const mainPassword = "19/04/23";

/* 💌 message */
const message = `Happy 3rd Anniversary Maa Gurleeyyy 💌

Today marks three beautiful years of us… and even now, it feels unreal how time has passed so quickly, yet every single moment with you still feels as special, fresh, and magical as the very first day we began this journey together. These three years are not just a count of days or months — they are a collection of memories, emotions, laughter, challenges, growth, and countless little moments that slowly turned into something so deep and meaningful that words can barely describe it.

When I look back, I don’t just see time… I see a story. Our story. A story that started with simple conversations, small smiles, and innocent feelings, but slowly grew into something so strong, so real, and so irreplaceable. You didn’t just become part of my life… you became the reason behind so many of my happiest moments. Without even realizing it, you became the center of my world.

You came into my life so quietly, without any warning, without any big moment… but somehow, you became everything. You became my comfort in silence, my happiness in chaos, my peace in confusion, and my strength when I felt weak. There are days when I don’t even need words from you — just knowing that you exist in my life is enough to make everything feel okay.

I still remember the little things — the way we used to talk for hours without realizing time passing, the way your smile could change my mood instantly, the way even our smallest moments felt special. Those memories are not just memories anymore… they are a part of me. They live in my heart, and they always will.

There were times when things were not easy. Times when we faced misunderstandings, distance, stress, or moments where everything felt uncertain. But what makes our love truly special is not that everything was perfect… it’s that we stayed. We chose each other even when things were hard. We didn’t give up. And that is what makes what we have so rare and so real.

Thank you for loving me the way you do. Thank you for understanding me even when I couldn’t explain myself. Thank you for being patient with me, for standing beside me, and for never letting go even when things weren’t easy. You have seen me in ways no one else has — my strengths, my flaws, my fears, my dreams — and yet you chose to stay. That means more to me than anything in this world.

These three years are filled with moments I will carry with me forever — the laughter that made my stomach hurt, the late-night talks that felt endless, the silly arguments that somehow made us stronger, the dreams we shared, and the quiet moments where everything felt peaceful just because you were there. Every single one of those moments is a treasure I hold close to my heart.

Sometimes I wonder how my life would have been if I never met you… and honestly, I don’t even want to imagine it. Because you didn’t just add happiness to my life — you gave it meaning. You made ordinary days feel special, and you made life feel more beautiful than I ever thought it could be.

I don’t know what the future holds for us. Life is unpredictable, and things may not always go as planned. But one thing I know for sure is this — no matter what happens, no matter where life takes us, I want you to be a part of it. I want to walk every path with you, face every challenge with you, and celebrate every joy with you. Because with you, everything feels worth it.

You are not just my partner… you are my safe place, my home, my happiness, and my forever. You are the person I want to share my life with — not just the good moments, but every moment. The simple ones, the difficult ones, the unforgettable ones… all of them.

As we complete these three years together, I don’t just celebrate our past — I look forward to our future. I look forward to more memories, more laughter, more growth, more love, and more moments where we choose each other again and again, no matter what.

And if I had the chance to start everything all over again… I would still choose you. Every single time. Without hesitation. Without doubt. Because loving you is the best thing that ever happened to me.

So today, on this special day, I just want to remind you of one thing — my love for you is real, it is deep, and it is forever. It may not always be perfect, but it is always true.

Happy 3rd Anniversary once again, my love 💞
Thank you for being mine… and for letting me be yours.

Forever yours, always and endlessly 😩🫂💙`;

let i = 0;
function typeWriter() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 25);
    }
}

function unlockMain() {
    const input = document.getElementById("password").value;

    if (input === mainPassword) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
        typeWriter();
    } else {
        alert("Wrong password 💔");
    }
}

</script>

</body>
</html>
